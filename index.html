<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>Pong</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: black;
  }
  canvas { display: block; }
</style>
</head>
<body>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// ---------------- SCREEN ----------------
let WIDTH = window.innerWidth;
let HEIGHT = window.innerHeight;

function resize() {
  WIDTH = window.innerWidth;
  HEIGHT = window.innerHeight;
  canvas.width = WIDTH;
  canvas.height = HEIGHT;
}
window.addEventListener("resize", resize);
resize();

// ---------------- STATES ----------------
const MENU = "menu";
const SCORE = "score";
const DIFFICULTY = "difficulty";
const COUNTDOWN = "countdown";
const PLAY = "play";
const END = "end";

let state = MENU;

// ---------------- SETTINGS ----------------
let scoreToWin = 10;
let aiDifficulty = 2;
let gameMode = 1;

// ---------------- OBJECTS ----------------
const PW = 10;
const PH = 100;

function paddleSpeed() {
  return Math.max(5, WIDTH / 260);
}

let left = { x: 30, y: HEIGHT/2 - 50, w: PW, h: PH };
let right = { x: WIDTH - 40, y: HEIGHT/2 - 50, w: PW, h: PH };

let ball = { x: WIDTH/2, y: HEIGHT/2, w: 12, h: 12 };

let baseSpeed = WIDTH / 320;
let ballSpeedX = 0;
let ballSpeedY = 0;

// ---------------- HIT SPEED SYSTEM ----------------
let totalHits = 0;

function applySpeed() {
  let multiplier = 1 + Math.floor(totalHits / 5) * 0.10;

  let angle = Math.atan2(ballSpeedY, ballSpeedX);
  let speed = baseSpeed * multiplier;

  ballSpeedX = Math.cos(angle) * speed;
  ballSpeedY = Math.sin(angle) * speed;
}

// ---------------- SCORE ----------------
let leftScore = 0;
let rightScore = 0;

// ---------------- INPUT ----------------
let keys = {};

document.addEventListener("keydown", e => {
  const key = e.key.toLowerCase();

  // prevent repeat spam
  if (keys[key]) return;
  keys[key] = true;

  if (state === MENU) {
    if (key === "1") { gameMode = 1; state = SCORE; }
    if (key === "2") { gameMode = 2; state = SCORE; }
  }

  else if (state === SCORE) {
    if (key === "1") { scoreToWin = 5; nextStep(); }
    if (key === "2") { scoreToWin = 10; nextStep(); }
    if (key === "3") { scoreToWin = 25; nextStep(); }
    if (key === "4") { scoreToWin = 50; nextStep(); }
  }

  else if (state === DIFFICULTY) {
    if (key === "1") { aiDifficulty = 1; startMatch(); }
    if (key === "2") { aiDifficulty = 2; startMatch(); }
    if (key === "3") { aiDifficulty = 3; startMatch(); }
  }

  if (state === END && key === "r") state = MENU;
});

document.addEventListener("keyup", e => {
  keys[e.key.toLowerCase()] = false;
});

function nextStep() {
  if (gameMode === 1) state = DIFFICULTY;
  else startMatch();
}

// ---------------- AI ----------------
let aiTarget = HEIGHT/2;
let aiTimer = 0;

function aiMove() {
  let reaction, error, speed;

  if (aiDifficulty === 1) {
    reaction = 30; error = 180; speed = 0.05;
  } else if (aiDifficulty === 2) {
    reaction = 20; error = 100; speed = 0.08;
  } else {
    reaction = 10; error = 40; speed = 0.12;
  }

  if (aiTimer++ >= reaction) {
    aiTimer = 0;

    let predicted = ball.y + ballSpeedY * 10;
    predicted += (Math.random() * error - error/2);

    aiTarget = Math.max(0, Math.min(HEIGHT, predicted));
  }

  right.y += (aiTarget - (right.y + right.h/2)) * speed;
}

// ---------------- START ----------------
let countdown = 3;

function startMatch() {
  leftScore = 0;
  rightScore = 0;
  totalHits = 0;

  resetBall(Math.random() < 0.5 ? -1 : 1);

  countdown = 3;
  state = COUNTDOWN;

  let t = setInterval(() => {
    countdown--;
    if (countdown <= 0) {
      clearInterval(t);
      state = PLAY;
    }
  }, 1000);
}

// ---------------- BALL ----------------
function resetBall(dir) {
  ball.x = WIDTH/2;
  ball.y = HEIGHT/2;

  ballSpeedX = baseSpeed * dir;
  ballSpeedY = baseSpeed * (Math.random() < 0.5 ? -1 : 1);
}

// ---------------- SCORING ----------------
function score(side) {
  if (side === "left") leftScore++;
  else rightScore++;

  if (leftScore >= scoreToWin || rightScore >= scoreToWin) {
    state = END;
  } else {
    totalHits = 0;
    resetBall(Math.random() < 0.5 ? -1 : 1);
  }
}

// ---------------- DRAW ----------------
function drawCentered(text, size, y) {
  ctx.font = `${size}px Arial`;
  ctx.fillText(text, WIDTH/2, y);
}

function drawMenu() {
  ctx.fillStyle = "black";
  ctx.fillRect(0,0,WIDTH,HEIGHT);
  ctx.fillStyle = "white";
  ctx.textAlign = "center";

  drawCentered("Select Mode", WIDTH/20, HEIGHT/3);
  drawCentered("1 - vs AI", WIDTH/40, HEIGHT/2);
  drawCentered("2 - PvP", WIDTH/40, HEIGHT/2 + 50);
}

function drawScore() {
  ctx.fillStyle = "black";
  ctx.fillRect(0,0,WIDTH,HEIGHT);
  ctx.fillStyle = "white";
  ctx.textAlign = "center";

  drawCentered("Score To Win", WIDTH/20, HEIGHT/3);
  drawCentered("5 (1)", WIDTH/40, HEIGHT/2);
  drawCentered("10 (2)", WIDTH/40, HEIGHT/2 + 40);
  drawCentered("25 (3)", WIDTH/40, HEIGHT/2 + 80);
  drawCentered("50 (4)", WIDTH/40, HEIGHT/2 + 120);
}

function drawDifficulty() {
  ctx.fillStyle = "black";
  ctx.fillRect(0,0,WIDTH,HEIGHT);
  ctx.fillStyle = "white";
  ctx.textAlign = "center";

  drawCentered("AI Difficulty", WIDTH/20, HEIGHT/3);
  drawCentered("Easy (1)", WIDTH/40, HEIGHT/2);
  drawCentered("Medium (2)", WIDTH/40, HEIGHT/2 + 40);
  drawCentered("Hard (3)", WIDTH/40, HEIGHT/2 + 80);
}

function drawCountdown() {
  ctx.fillStyle = "black";
  ctx.fillRect(0,0,WIDTH,HEIGHT);
  ctx.fillStyle = "white";
  ctx.textAlign = "center";

  drawCentered(countdown, WIDTH/8, HEIGHT/2);
}

function drawGame() {
  ctx.fillStyle = "black";
  ctx.fillRect(0,0,WIDTH,HEIGHT);

  ctx.fillStyle = "white";

  ctx.fillRect(left.x, left.y, left.w, left.h);
  ctx.fillRect(right.x, right.y, right.w, right.h);
  ctx.fillRect(ball.x, ball.y, ball.w, ball.h);

  ctx.font = `${WIDTH/25}px Arial`;
  ctx.textAlign = "center";
  ctx.fillText(`${leftScore} : ${rightScore}`, WIDTH/2, 60);
}

function drawEnd() {
  ctx.fillStyle = "black";
  ctx.fillRect(0,0,WIDTH,HEIGHT);
  ctx.fillStyle = "white";
  ctx.textAlign = "center";

  let winner = leftScore > rightScore ? "Left Wins!" : "Right Wins!";

  drawCentered(winner, WIDTH/25, HEIGHT/2);
  drawCentered(`${leftScore} - ${rightScore}`, WIDTH/25, HEIGHT/2 + 40);
  drawCentered("Press R to restart", WIDTH/40, HEIGHT/2 + 100);
}

// ---------------- LOOP ----------------
function update() {

  if (state === MENU) return drawMenu();
  if (state === SCORE) return drawScore();
  if (state === DIFFICULTY) return drawDifficulty();
  if (state === COUNTDOWN) return drawCountdown();
  if (state === END) return drawEnd();

  let s = paddleSpeed();

  if (keys["w"]) left.y -= s;
  if (keys["s"]) left.y += s;

  if (gameMode === 2) {
    if (keys["arrowup"]) right.y -= s;
    if (keys["arrowdown"]) right.y += s;
  } else {
    aiMove();
  }

  left.y = Math.max(0, Math.min(HEIGHT - left.h, left.y));
  right.y = Math.max(0, Math.min(HEIGHT - right.h, right.y));

  ball.x += ballSpeedX;
  ball.y += ballSpeedY;

  if (ball.y <= 0 || ball.y + ball.h >= HEIGHT) ballSpeedY *= -1;

  function hit() {
    ballSpeedX *= -1;
    totalHits++;
    applySpeed();
  }

  if (ball.x < left.x + left.w &&
      ball.y > left.y &&
      ball.y < left.y + left.h &&
      ballSpeedX < 0) hit();

  if (ball.x + ball.w > right.x &&
      ball.y > right.y &&
      ball.y < right.y + right.h &&
      ballSpeedX > 0) hit();

  if (ball.x < 0) score("right");
  if (ball.x > WIDTH) score("left");

  drawGame();
}

function loop() {
  update();
  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
